{% extends 'base.html' %}
{% block title %}Datasets{% endblock %}
{% block content %}
<h2>Fundus Dataset</h2>
<div class="actions-row">
  <a class="btn" href="{% url 'datasets:upload' %}">Upload Image</a>
  <a class="btn" href="{% url 'datasets:export_csv' %}">Export CSV</a>
</div>
<div class="grid">
  {% for img in images %}
  <div class="card">
    {% if img.image %}<img src="{{ img.image.url }}" alt="image"/>{% endif %}
    <div class="card-body">
      <small>{{ img.uploaded_at }}</small>
      <p>{{ img.label }}</p>
    </div>
  </div>
  {% empty %}<p>No images yet.</p>{% endfor %}
</div>
{% endblock %}
